# Nombre descriptivo del workflow de CD en la pestaña de Actions de GitHub
name: Entrega Continua (CD)

# Seccion 'on' para configurar los disparadores del flujo
on:
  # El workflow se ejecutara cuando se haga push a una etiqueta (tag)
  push:
    tags:
      # Filtro de etiqueta: debe seguir el patron de version semantica (v1.0.0, v2.3.15, etc.)
      - 'v*.*.*'

# Seccion 'jobs' donde se agrupan las tareas a realizar
jobs:
  # Definición del trabajo de publicacion de la release
  release:
    # Se ejecuta en un entorno virtual basado en la ultima version de Ubuntu
    runs-on: ubuntu-latest
    
    # Permisos minimos necesarios del GITHUB_TOKEN para poder crear una Release y adjuntar archivos
    permissions:
      contents: write

    # Pasos secuenciales del job
    steps:
      # Descarga del codigo fuente en la etiqueta actual
      - name: Descargar codigo (Checkout)
        uses: actions/checkout@v4

      # Configuración de Java 21 y la cache de Maven en el runner
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          # Version de Java a utilizar, debe coincidir con pom.xml (Java 21)
          java-version: '21'
          # Distribucion de Java Temurin (Eclipse Adoptium)
          distribution: 'temurin'
          # Activar cache de dependencias de Maven para acelerar la descarga
          cache: 'maven'

      # Empaquetado del proyecto con Maven para generar el archivo JAR ejecutable
      - name: Empaquetar Aplicacion (Generar JAR)
        # mvn clean package compila el codigo, corre las pruebas y empaqueta la aplicacion en un archivo JAR
        run: mvn clean package

      # Creacion de la Release en GitHub y carga del archivo JAR adjunto
      - name: Crear GitHub Release
        # Utiliza la accion oficial softprops/action-gh-release para automatizar la creacion del Release
        uses: softprops/action-gh-release@v2
        with:
          # Especifica la ruta de los archivos que se desean subir como adjuntos en el release (los assets)
          files: target/tppatrones-1.0-SNAPSHOT.jar
          # Genera automaticamente las notas de la release (changelog) basandose en los commits realizados
          generate_release_notes: true
        env:
          # Token de autenticacion necesario que GitHub provee automaticamente en la ejecucion del flujo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
